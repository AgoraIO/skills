openapi: "3.0.3"
info:
  title: Agora Conversational AI Engine — Summary Reference
  description: >
    Condensed reference for the 90% use case. For full details use MCP:
    get-doc-content {"uri": "docs://default/convoai/restful/get-started/quick-start"}
    or https://docs.agora.io/en/conversational-ai/develop/rest-api
  version: "v2"

servers:
  - url: https://api.agora.io/api/conversational-ai-agent/v2/projects/{appid}
    variables:
      appid:
        description: Your Agora App ID

security:
  - basicAuth: []

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Customer ID + Customer Secret (Agora Console → Developer Toolkit → RESTful API)

  schemas:
    LLMConfig:
      type: object
      properties:
        url: {type: string}
        api_key: {type: string}
        model: {type: string}
        system_message: {type: string}
        greeting_message: {type: string}
        params:
          type: object
          description: "WARNING: /update overwrites params entirely — always send full object"

    TTSConfig:
      type: object
      properties:
        vendor: {type: string, description: "e.g. microsoft, elevenlabs, cartesia"}
        params: {type: object}

    ASRConfig:
      type: object
      properties:
        vendor: {type: string, description: "e.g. microsoft, deepgram"}
        language: {type: string}
        params: {type: object}

    AgentStatus:
      type: object
      properties:
        agent_id: {type: string}
        status:
          type: integer
          description: "0=IDLE 1=STARTING 2=RUNNING 3=STOPPING 4=STOPPED 5=RECOVERING 6=FAILED"
        create_ts: {type: integer}
        update_ts: {type: integer}

paths:
  /join:
    post:
      summary: Start agent — joins RTC channel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, properties]
              properties:
                name:
                  type: string
                  description: Unique agent name per App ID
                properties:
                  type: object
                  required: [channel, token, agent_rtc_uid, remote_rtc_uids]
                  properties:
                    channel: {type: string}
                    token: {type: string}
                    agent_rtc_uid:
                      type: string
                      description: "Agent UID as STRING not integer — e.g. '12345'"
                    remote_rtc_uids:
                      type: array
                      items: {type: string}
                      description: User UIDs to subscribe to (strings)
                    llm:
                      $ref: '#/components/schemas/LLMConfig'
                    tts:
                      $ref: '#/components/schemas/TTSConfig'
                    asr:
                      $ref: '#/components/schemas/ASRConfig'
                    mllm:
                      type: object
                      description: Multimodal LLM (e.g. Gemini Live)
                      properties:
                        url: {type: string}
                        api_key: {type: string}
                        model: {type: string}
                        params:
                          type: object
                          properties:
                            location:
                              type: string
                              description: "Use 'location' NOT 'region' — e.g. us-central1"
                    advanced_features:
                      type: object
                      properties:
                        enable_rtm:
                          type: boolean
                          description: Required true for RTM transcript events
                    parameters:
                      type: object
                      properties:
                        data_channel:
                          type: string
                          description: "Set to 'rtm' with enable_rtm:true for transcript events"
                        enable_metrics: {type: boolean}
                        enable_error_message: {type: boolean}
      responses:
        "200":
          description: Agent started
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent_id: {type: string}

  /agents/{agentId}/leave:
    post:
      summary: Stop agent — leaves channel
      parameters:
        - {name: agentId, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: Agent stopped

  /agents/{agentId}/update:
    post:
      summary: Update agent config mid-session
      description: "WARNING: params objects overwritten entirely — send full object"
      parameters:
        - {name: agentId, in: path, required: true, schema: {type: string}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                properties:
                  type: object
                  properties:
                    token: {type: string}
                    llm:
                      $ref: '#/components/schemas/LLMConfig'
      responses:
        "200":
          description: Updated

  /agents/{agentId}/speak:
    post:
      summary: Broadcast TTS message to channel
      parameters:
        - {name: agentId, in: path, required: true, schema: {type: string}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                text: {type: string}
                interrupt:
                  type: string
                  enum: [INTERRUPT, APPEND, IGNORE]
                  description: "INTERRUPT=immediate (default), APPEND=queue, IGNORE=skip if busy"
                interruptable:
                  type: boolean
      responses:
        "200":
          description: Message sent

  /agents/{agentId}:
    get:
      summary: Query agent status
      parameters:
        - {name: agentId, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: Agent status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgentStatus'
